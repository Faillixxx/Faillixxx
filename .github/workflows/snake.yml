name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove snake progress bar
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          for path in Path("dist").glob("github-contribution-grid-snake*.svg"):
              svg = path.read_text()
              svg = re.sub(r'<rect class="u [^"]*"[^>]*/>', "", svg)
              svg = re.sub(r'\.u\{[^}]*\}', "", svg)
              svg = re.sub(r'@keyframes u\d+\{[^}]*\}', "", svg)
              svg = re.sub(r'\.u\.u\d+\{[^}]*\}', "", svg)
              svg = svg.replace('viewBox="-16 -32 880 192"', 'viewBox="-16 -32 880 144"')
              svg = svg.replace('height="192"', 'height="144"')
              path.write_text(svg)
          PY

      - name: Publish snake assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
